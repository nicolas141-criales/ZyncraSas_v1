version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Zyncra AI Booking Assistant — Oracle Cloud Free Tier (ARM)
#  Services: nginx · zyncra · openclaw · ollama
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro          # Mount your SSL certs here
      - nginx_logs:/var/log/nginx
    depends_on:
      zyncra:
        condition: service_healthy
      openclaw:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Next.js app (Zyncra) ───────────────────────────────────────────────────
  zyncra:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Override env vars at runtime via env_file above
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    depends_on:
      ollama:
        condition: service_healthy

  # ── OpenClaw AI agent ──────────────────────────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest      # Replace with actual image
    restart: unless-stopped
    volumes:
      - ./openclaw:/app/config:ro
      - openclaw_data:/app/data
    environment:
      - OPENCLAW_CONFIG=/app/config/agent.yaml
      - ZYNCRA_API_URL=${ZYNCRA_API_URL:-http://zyncra:3000}
      - AI_API_SECRET=${AI_API_SECRET}
      - OLLAMA_BASE_URL=http://ollama:11434
    expose:
      - "8080"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ── Ollama LLM backend ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    expose:
      - "11434"
    # For Oracle ARM: remove --gpus flag; Ollama auto-detects CPU
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 20s
      start_period: 120s    # Models may need time to load
      retries: 5

volumes:
  ollama_models:
    driver: local
  openclaw_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  default:
    name: zyncra_ai_net
    driver: bridge
